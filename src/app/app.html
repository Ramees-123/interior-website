<!-- Premium Mobile-First Loading Screen -->
<div id="mobileLoader" class="mobile-loader">
  <div class="loader-container">
    <!-- Logo with premium animation -->
    <div class="logo-animation-wrapper">
      <img src="assets/andspacio-logo.png" alt="andspacio" class="loader-logo" loading="eager" width="120" height="60" />
    </div>
    <!-- Company name with letter spacing animation -->
    <div class="company-title-loader">andspacio</div>
    <div class="company-subtitle-loader">INTERIOR DESIGN STUDIO</div>
  </div>
  <!-- Premium progress bar with shimmer effect -->
  <div class="loader-progress">
    <div class="loader-progress-bar"></div>
    <div class="loader-progress-shimmer"></div>
  </div>
</div>

<!-- Home Anchor -->
<a id="home"></a>

<!-- Header -->
<header class="header cinematic-header" [class.scrolled]="isScrolled">
  <div class="header-glass-layer"></div>
  <div class="header-shine-sweep"></div>
  <div class="header-light-orb orb-left"></div>
  <div class="header-light-orb orb-right"></div>

  <div class="header-container">
    <!-- Hamburger Menu -->
    <button class="hamburger premium-hamburger" (click)="toggleMenu()" [class.active]="isMenuOpen" aria-label="Toggle menu">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <!-- Logo and Company Name -->
    <div class="logo-container cinematic-logo-container">
      <div class="logo-halo"></div>
      <div class="logo-frame"></div>

      <a routerLink="/" class="logo cinematic-logo" (click)="scrollTop()">
        <img
          src="assets/andspacio-logo.png"
          alt="Andspacio logo"
          class="logo-image"
          loading="eager"
          width="120"
          height="60"
          onerror="this.style.display='none'; this.nextElementSibling.style.display='block';"
        />
        <div class="logo-text-fallback" style="display:none">Andspacio</div>
      </a>

      <div class="company-name premium-company-name">
        <div class="company-title">andspacio</div>
        <div class="company-subtitle">INTERIOR DESIGN STUDIO</div>
      </div>
    </div>

    <!-- Spacer -->
    <div class="header-spacer"></div>
  </div>
</header>

<!-- Full Screen Menu Overlay -->
<div class="menu-overlay" [class.active]="isMenuOpen" (click)="closeMenu()">

  <div class="menu-luxury-bg"></div>
  <div class="menu-luxury-glow glow-1"></div>
  <div class="menu-luxury-glow glow-2"></div>

  <div class="menu-shell" (click)="$event.stopPropagation()">

    <div class="menu-scroll-container">
      <nav class="menu-nav">
        <a href="#home" (click)="scrollToTop($event); closeMenu()" class="menu-link luxury-menu-link">
          <span class="menu-link-line"></span>
          <span class="menu-text">Home</span>
          <span class="menu-arrow">→</span>
        </a>

        <a routerLink="/about" (click)="scrollToSection('about', $event)" class="menu-link luxury-menu-link">
          <span class="menu-link-line"></span>
          <span class="menu-text">About</span>
          <span class="menu-arrow">→</span>
        </a>

        <a routerLink="/services" (click)="scrollToSection('services', $event)" class="menu-link luxury-menu-link">
          <span class="menu-link-line"></span>
          <span class="menu-text">Services</span>
          <span class="menu-arrow">→</span>
        </a>

        <a routerLink="/portfolio" (click)="scrollToSection('portfolio', $event)" class="menu-link luxury-menu-link">
          <span class="menu-link-line"></span>
          <span class="menu-text">Projects</span>
          <span class="menu-arrow">→</span>
        </a>

        <a routerLink="/contact" (click)="scrollToSection('contact', $event)" class="menu-link luxury-menu-link">
          <span class="menu-link-line"></span>
          <span class="menu-text">Get a Quote</span>
          <span class="menu-arrow">→</span>
        </a>
      </nav>
    </div>

  </div>
</div>

<!-- Main Content -->
<main>
  <router-outlet></router-outlet>
</main>

<!-- Footer -->
<footer class="footer premium-footer">
  <div class="footer-glow"></div>
  <div class="footer-shine"></div>

  <div class="footer-container">
    <div class="footer-logo">
      <div class="footer-logo-ring"></div>

      <img
        src="assets/andspacio-logo.png"
        alt="andspacio logo"
        class="footer-logo-image"
        loading="lazy"
        width="120"
        height="60"
        onerror="this.style.display='none'; this.nextElementSibling.style.display='block';"
      />

      <div class="footer-text-fallback" style="display:none">andspacio</div>
      <div class="footer-brand-block">
        <div class="footer-company">andspacio</div>
        <div class="footer-tagline">INTERIOR DESIGN STUDIO</div>
      </div>
    </div>

    <div class="footer-info">
      <p class="footer-contact">+91 62388 35584</p>
      <p class="footer-location">Kozhikode, Kerala</p>
    </div>

    <div class="footer-line"></div>

    <p class="footer-copyright">© 2026 Andspacio. All rights reserved.</p>
  </div>
</footer>
