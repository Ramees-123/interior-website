<!-- Premium Mobile-First Loading Screen -->
<div id="mobileLoader" class="mobile-loader">
  <div class="loader-container">
    <!-- Logo with premium animation -->
    <div class="logo-animation-wrapper">
      <img src="assets/andspacio-logo.png" alt="andspacio" class="loader-logo" loading="eager" width="120" height="60" />
    </div>
    <!-- Company name with letter spacing animation -->
    <div class="company-title-loader">andspacio</div>
    <div class="company-subtitle-loader">INTERIOR DESIGN STUDIO</div>
  </div>
  <!-- Premium progress bar with shimmer effect -->
  <div class="loader-progress">
    <div class="loader-progress-bar"></div>
    <div class="loader-progress-shimmer"></div>
  </div>
</div>

<!-- Home Anchor -->
<a id="home"></a>

<!-- Header -->
<header class="header" [class.scrolled]="isScrolled">
  <div class="header-container">
    <!-- Hamburger Menu -->
    <button class="hamburger" (click)="toggleMenu()" [class.active]="isMenuOpen">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <!-- Logo and Company Name -->
    <div class="logo-container">
      <a routerLink="/" class="logo" (click)="scrollTop()">
        <img src="assets/andspacio-logo.png" alt="Andspacio logo" class="logo-image" loading="eager" width="120" height="60" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';" />
        <div class="logo-text-fallback" style="display:none">Andspacio</div>
      </a>
      <div class="company-name">
        <div class="company-title">andspacio</div>
        <div class="company-subtitle">INTERIOR DESIGN STUDIO</div>
      </div>
    </div>

    <!-- Spacer for centering -->
    <div class="header-spacer"></div>
  </div>
</header>

<!-- Full Screen Menu Overlay -->
<div class="menu-overlay" [class.active]="isMenuOpen" (click)="closeMenu()">
  <nav class="menu-nav">
    <a href="#home" (click)="scrollToTop($event); closeMenu()" class="menu-link">
      <span class="menu-text">Home</span>
    </a>
    <a routerLink="/about" (click)="scrollTop(); closeMenu()" class="menu-link">
      <span class="menu-text">About</span>
    </a>
    <a routerLink="/services" (click)="scrollTop(); closeMenu()" class="menu-link">
      <span class="menu-text">Services</span>
    </a>
    <a routerLink="/portfolio" (click)="scrollTop(); closeMenu()" class="menu-link">
      <span class="menu-text">Projects</span>
    </a>
    <a routerLink="/contact" (click)="scrollTop(); closeMenu()" class="menu-link">
      <span class="menu-text">Get a Quote</span>
    </a>
  </nav>
</div>

<!-- Main Content -->
<main>
  <router-outlet></router-outlet>
</main>

<!-- Footer -->
<footer class="footer">
  <div class="footer-container">
    <div class="footer-logo">
  <img src="assets/andspacio-logo.png" alt="andspacio logo" class="footer-logo-image" loading="lazy" width="120" height="60" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';" />
      <div class="footer-company">andspacio</div>
      <div class="footer-text-fallback" style="display:none">andspacio</div>
    </div>
    <div class="footer-info">
      <p class="footer-contact">+91 62388 35584</p>
      <p class="footer-location">Kozhikode, Kerala</p>
    </div>
    <div class="footer-line"></div>
  <p class="footer-copyright">© 2026 Andspacio. All rights reserved.</p>
  </div>
</footer>
